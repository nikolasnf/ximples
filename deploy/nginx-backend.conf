server {
    listen 80;
    server_name backend.ximples.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name backend.ximples.com.br;

    ssl_certificate /etc/letsencrypt/live/backend.ximples.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backend.ximples.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /srv/projects/ximples/backend/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logs
    access_log /srv/projects/ximples/logs/backend-access.log;
    error_log /srv/projects/ximples/logs/backend-error.log;

    # Block sensitive files
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* \.(env|log|md)$ {
        deny all;
    }

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Deny access to storage
    location /storage {
        deny all;
    }

    client_max_body_size 20M;
}
